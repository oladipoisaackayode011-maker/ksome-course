<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>signup</title>
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="form">
    <div class="enroll-container">

      <h1>SIGN UP NOW</h1>

      <p>Sign up today to Join KSOME Community</p>

      <!-- This shows success or error messages -->
      <p id="msg" style="color:red; font-weight:bold;"></p>

      <form>

        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Enter your First Name" required>

        <label>Surname Name</label>
        <input type="text" id="surname" placeholder="Enter your Surname" required>

        <label>E-mail Address</label>
        <input type="email" id="email" placeholder="Enter your E-mail" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your Phone Number" required>

        <label>Additional Number</label>
        <input type="tel" id="phoneExtra" placeholder="Enter your additional Number">

        <label>Create Password</label>
        <input type="password" id="password" placeholder="Enter your Password" required>

        <label>Re-enter Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>

        <button type="button" onclick="signup()">Submit</button>

      </form>

      <a href="index.html" class="btn-home">Back Home</a>

    </div>
  </div>

  <!-- Load your auth.js file -->
  <script type="module" src="js/auth.js"></script>

</body>
</html>
